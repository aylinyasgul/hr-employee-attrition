# .github/workflows/train.yml
name: Train

on:
  workflow_call:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r 06-cicd/requirements.txt

      - name: Copy processed data
        run: |
          mkdir -p 06-cicd/data/processed
          cp data/processed/train.csv 06-cicd/data/processed/
          cp data/processed/test.csv  06-cicd/data/processed/

      - name: Train model
        working-directory: 06-cicd
        env:
          DATA_DIR: data/processed
        run: python train.py

      - name: Verify model artifacts
        run: |
          ls -lh 06-cicd/models/
          cat 06-cicd/models/metrics.json

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: 06-cicd/models/
          retention-days: 7
